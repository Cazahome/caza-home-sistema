<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cazá Home — Conectando...</title>
<style>
  body{font-family:'Segoe UI',sans-serif;background:#FAF7F4;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;flex-direction:column;gap:16px;}
  .logo{font-size:28px;font-weight:700;letter-spacing:4px;color:#8B5E3C;}
  .msg{font-size:14px;color:#9A8070;}
  .spin{width:32px;height:32px;border:3px solid #E8DDD4;border-top-color:#8B5E3C;border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .erro{color:#B73A3A;font-size:13px;max-width:360px;text-align:center;}
</style>
</head>
<body>
<div class="logo">CAZÁ HOME</div>
<div class="spin"></div>
<div class="msg" id="msg">Conectando ao OneDrive...</div>
<div class="erro" id="erro" style="display:none;"></div>

<script>
(function(){
  const hash = window.location.hash;

  // Erro vindo da Microsoft
  if(hash && hash.includes('error')){
    const p = new URLSearchParams(hash.substring(1));
    const desc = p.get('error_description') || p.get('error') || 'Erro desconhecido';
    document.getElementById('msg').textContent = 'Erro no login';
    document.getElementById('erro').style.display = 'block';
    document.getElementById('erro').textContent = desc;
    if(window.opener){ window.opener.postMessage({type:'ms_token',error:desc}, window.opener.location.origin); }
    setTimeout(()=>window.close(), 4000);
    return;
  }

  // Token recebido com sucesso
  if(hash && hash.includes('access_token')){
    const p = new URLSearchParams(hash.substring(1));
    const token  = p.get('access_token');
    const expSec = parseInt(p.get('expires_in')) || 3600;

    if(token && window.opener){
      try {
        window.opener.postMessage(
          { type:'ms_token', token, expSec },
          window.opener.location.origin
        );
        document.getElementById('msg').textContent = '✓ Conectado! Fechando...';
      } catch(e){
        document.getElementById('msg').textContent = 'Erro ao comunicar com o sistema.';
      }
    }
    setTimeout(()=>window.close(), 1200);
    return;
  }

  // Nenhum token nem erro — página acessada diretamente
  document.getElementById('msg').textContent = 'Esta página é usada pelo login automático.';
  setTimeout(()=>{
    window.location.href = './';
  }, 2000);
})();
</script>
</body>
</html>
